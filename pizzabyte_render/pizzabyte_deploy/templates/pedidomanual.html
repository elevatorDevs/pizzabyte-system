<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria Delícia - Pedido Manual</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/static/css/pedidomanualstyle.css">
    <style>
        .pizza-item {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .add-pizza {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <!-- Barra de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#banner">
                <img src="{{ url_for('static', filename='img/logoo.png') }}" alt="Logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('pedidomanual') }}">Fazer pedidos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('verpedido') }}">Ver pedidos</a></li>
                    <a class="nav-link" href="{{ url_for('relatorios') }}">Relatórios</a>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Sair</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Formulário de Pedido Manual -->
    <div class="pedido-container" id="home">
        <h2>Fazer Pedido</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="close" data-dismiss="alert">
                            <span>&times;</span>
                        </button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('processar_pedidomanual') }}" method="post">
            <!-- Dados do Cliente -->
            <div class="form-group">
                <label for="nome">Nome do Cliente</label>
                <input type="text" class="form-control" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="endereco">Endereço</label>
                <input type="text" class="form-control" id="endereco" name="endereco" required>
            </div>

            <div class="form-group">
                <label for="celular">Celular</label>
                <input type="tel" class="form-control" id="celular" name="celular" required>
            </div>

            <!-- Lista de Pizzas -->
            <h4>Pizzas</h4>
            <div id="pizzas-container">
                <div class="pizza-item">
                    <div class="form-group">
                        <label>Sabor</label>
                        <select class="form-control" name="pizzas" required>
                            {% for pizza in pizzas %}
                                <option value="{{ pizza['id'] }}">{{ pizza['nome'] }} - R$ {{ "%.2f"|format(pizza['preco']) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantidade</label>
                        <input type="number" class="form-control" name="quantidades" min="1" value="1" required>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-secondary add-pizza" id="add-pizza">+ Adicionar outra pizza</button>

            <!-- Forma de Pagamento -->
            <div class="form-group">
                <label for="pagamento">Forma de Pagamento</label>
                <select class="form-control" id="pagamento" name="pagamento" required>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>
            </div>

            <!-- Observações -->
            <div class="form-group">
                <label for="observacoes">Observações</label>
                <textarea class="form-control" id="observacoes" name="observacoes" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-pedido">Fazer Pedido</button>
        </form>
    </div>

    <!-- Incluindo o Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Adicionar nova pizza
            $('#add-pizza').click(function() {
                const newPizza = $(`<div class="pizza-item">
                    <button type="button" class="close remove-pizza">&times;</button>
                    <div class="form-group">
                        <label>Sabor</label>
                        <select class="form-control" name="pizzas" required>
                            {% for pizza in pizzas %}
                                <option value="{{ pizza['id'] }}">{{ pizza['nome'] }} - R$ {{ "%.2f"|format(pizza['preco']) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantidade</label>
                        <input type="number" class="form-control" name="quantidades" min="1" value="1" required>
                    </div>
                </div>`);
                
                $('#pizzas-container').append(newPizza);
            });
            
            // Remover pizza
            $(document).on('click', '.remove-pizza', function() {
                if($('.pizza-item').length > 1) {
                    $(this).closest('.pizza-item').remove();
                } else {
                    alert('O pedido deve ter pelo menos uma pizza!');
                }
            });
        });
    </script>
</body>
</html>
