<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PizzaByte</title>

    <!-- Incluindo o Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Fonte personalizada -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" type="text/css" href="/static/css/cadastrostyle.css">

</head>
<body>

    <!-- Barra de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <!-- Logo da pizzaria -->
            <a class="navbar-brand" href="#banner">
                <img src="{{ url_for('static', filename='img/logoo.png') }}" alt="Logo">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('cardapio') }}">Cardápio</a></li>
                    
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('carrinho') }}">Carrinho</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('meus_pedidos') }}">Meus Pedidos</a></li>  
                    
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('login') }}">Entrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('cadastro') }}">Criar Conta</a></li>
                    
                </ul>
            </div>
        </div>
    </nav>

    <!-- Título de Cadastro -->
    <div class="form-title">
        <h2>Conclua seu cadastro antes de fazer seu pedido!</h2>
    </div>

    <!-- Formulário de Cadastro -->
    <div class="form-container">
        <form action="#" method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="endereco" placeholder="Endereço" required>
            <input type="text" name="celular" placeholder="Celular" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>

            <input type="submit" value="Criar Conta">
        </form>
    </div>

    <!-- Rodapé -->
    <footer class="footer">
        <p>&copy; 2025 Pizzaria Delícia. Todos os direitos reservados.</p>
        <p><a href="#">Política de Privacidade</a> | <a href="#">Termos de Serviço</a></p>
    </footer>

    <!-- Incluindo o Bootstrap JS (com dependências corretas) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
